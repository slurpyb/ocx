# slurpyb: fork CI. New file (not an edit to upstream ci.yml) so it never conflicts on
# `git merge upstream/main`. Upstream ci.yml only runs on `main`; this runs on our work branch.
name: slurpyb CI
on:
  push:
    branches: [slurpyb]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [slurpyb, main]
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run check # turbo: biome check + tsc --noEmit across the workspace
      - run: bun run build
      - run: bun test
        working-directory: packages/cli
